<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>

.bus{
    background-color: white;
    box-shadow: 2px 2px 4px rgba(255, 255, 255, 0.466);
    font-size:30px;
    border-radius: 10px;
    user-select:none;
    cursor:pointer;
    outline: 1.5px solid black;
    transition: 0.2s all;

}

.bus:hover{
    scale: 1.2;
    outline: 2.5px solid white;

}


.lus{
    font-family: sans-serif;
    white-space:normal;
    overflow-wrap:break-word;
    font-size:25px
}

</style>
</head>
<body style="text-align:center;font-family:sans-serif;background-color: rgb(218, 255, 162);">
<button class="bus">Click me</button>
</body>
