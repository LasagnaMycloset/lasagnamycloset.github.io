<!DOCTYPE html>
<html lang="en">
<head>
    <title>Notepad</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="text-align:center;background-color:gray;color:white;font-family: sans-serif;">
    <h2>Notepad</h2>
    <textarea id="sheet" style="width:80%;background-color:rgb(255, 255, 255);color:rgb(0, 0, 0);font-family: sans-serif; border-radius:10px; outline: solid black; font-size:20px"></textarea>
    <script>
        const sheet = document.getElementById('sheet');
        sheet.style.height = window.innerHeight / 1.35 + 'px';

        window.onload = () => {
            const savedContent = localStorage.getItem('notepad-content');
            if (savedContent) {
                sheet.value = savedContent;
            }
        };

        sheet.addEventListener('input', () => {
            localStorage.setItem('notepad-content', sheet.value);
        });
    </script>
    <p style="font-size:13px">Ctrl + LeftShit to make text left to right<span style="font-weight: bold; font-size: 15px; color:rgba(71, 71, 71, 0.37); user-select:none;"> │ </span>Ctrl + RightShift to make text right to left</p>
</body>
</html>
